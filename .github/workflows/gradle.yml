name: Build & Upload

on:
  push:
    branches:
      - "main"
      - "claude/**"
    tags:
      - "v*"
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # The build targets a Java 25 toolchain (see build.gradle.kts), while
      # Gradle itself runs on JDK 21. Installing both keeps the runner from
      # having to download a toolchain on every run.
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: |
            25
            21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle Wrapper
        run: ./gradlew build

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: Marlows-Crystal-Optimizer
          path: ${{ github.workspace }}/build/libs/*.jar
          if-no-files-found: error
